<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 WC 2026 EV Analysis — Model vs Polymarket</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;padding:1rem}
h1{font-size:1.3rem;margin-bottom:0.5rem}
h2{font-size:1rem;margin:1.5rem 0 0.5rem;color:#888}
.card{background:#1a1a1a;border-radius:12px;padding:1rem;margin-bottom:0.8rem;border:1px solid #2a2a2a}
.positive{color:#34c759}
.negative{color:#ff3b30}
.neutral{color:#888}
.match-title{font-weight:700;font-size:0.9rem;margin-bottom:0.3rem}
.outcome{display:inline-block;padding:0.15rem 0.5rem;border-radius:4px;font-weight:700;font-size:0.75rem;margin-right:0.3rem}
.outcome.W{background:rgba(52,199,89,0.15);color:#34c759}
.outcome.D{background:rgba(255,149,0,0.15);color:#ff9500}
.outcome.L{background:rgba(255,59,48,0.15);color:#ff3b30}
.bar-container{display:flex;height:6px;border-radius:3px;overflow:hidden;margin:0.3rem 0;background:#2a2a2a}
.bar{height:100%;transition:width 0.3s}
.bar.W{background:#34c759}
.bar.D{background:#ff9500}
.bar.L{background:#ff3b30}
.ev-badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:6px;font-weight:700;font-size:0.8rem}
.ev-badge.positive{background:rgba(52,199,89,0.15);color:#34c759}
.ev-badge.negative{background:rgba(255,59,48,0.15);color:#ff3b30}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;font-size:0.75rem;color:#888}
.stats .label{font-size:0.65rem;text-transform:uppercase}
.stats .value{font-size:1rem;font-weight:700;color:#e0e0e0}
.advice{margin-top:0.5rem;padding:0.5rem;border-radius:8px;font-size:0.8rem;line-height:1.4}
.advice.buy{background:rgba(52,199,89,0.08);border:1px solid rgba(52,199,89,0.2)}
.advice.sell{background:rgba(255,59,48,0.08);border:1px solid rgba(255,59,48,0.2)}
.advice.hold{background:rgba(255,149,0,0.08);border:1px solid rgba(255,149,0,0.2)}
.filter-btn{padding:0.3rem 0.8rem;border-radius:6px;border:1px solid #3a3a3a;background:transparent;color:#e0e0e0;cursor:pointer;font-size:0.75rem}
.filter-btn.active{background:#007aff;border-color:#007aff;color:#fff}
.header{display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
.volume{font-size:0.65rem;color:#666}
</style>
</head>
<body>

<h1>💰 WC 2026 — Model vs Polymarket</h1>
<p style="font-size:0.8rem;color:#888;margin-bottom:1rem">Top 20 biggest deviations between our Dixon-Coles + GBDT model and Polymarket real-money odds</p>

<div class="header">
  <button class="filter-btn active" onclick="filterAll()">All</button>
  <button class="filter-btn" onclick="filterPositiveEV()">🔥 Positive EV</button>
  <button class="filter-btn" onclick="filterHighEdge()">📐 High Edge</button>
  <button class="filter-btn" onclick="filterDraw()">⚖️ Draw Bets</button>
</div>

<div id="cards"></div>

<script>
const DATA = [
  {t1:"Iraq",t2:"Norway",o:"D",m:30.4,k:12.4,ev:144.4,vol:150128,mp:[21.1,30.4,48.5],mk:[5.5,12.4,82.1],adv:"Iraq vs Norway 平局是本页最大正EV。模型认为伊拉克有一定抵抗力(30%平局)，市场只给12%。挪威虽强但客场+防守漏洞大。",type:"buy"},
  {t1:"Ghana",t2:"Panama",o:"L",m:51.9,k:27.6,ev:88.0,vol:72174,mp:[18.0,30.0,51.9],mk:[43.7,28.6,27.6],adv:"模型认为巴拿马赢面52%，市场只给28%。巴拿马WCQ表现极佳(xG 1.93/场)，加纳近年下滑明显。高EV机会。",type:"buy"},
  {t1:"Norway",t2:"Senegal",o:"L",m:44.0,k:28.4,ev:55.2,vol:34850,mp:[24.5,31.5,44.0],mk:[44.3,27.4,28.4],adv:"模型看好塞内加尔(44%胜)远超市场(28%)。塞内加尔WCQ xG 1.61/场防守稳固，挪威过度依赖哈兰德。",type:"buy"},
  {t1:"Paraguay",t2:"Australia",o:"L",m:43.4,k:27.4,ev:58.6,vol:11151,mp:[25.0,31.7,43.4],mk:[43.3,29.4,27.4],adv:"模型给澳大利亚43%胜率，市场27%。澳大利亚WCQ xG 0.97/场但防守极佳(xGA 1.13)。巴拉圭进攻乏力。",type:"buy"},
  {t1:"Iraq",t2:"Norway",o:"W",m:21.1,k:5.5,ev:286.2,vol:150128,mp:[21.1,30.4,48.5],mk:[5.5,12.4,82.1],adv:"伊拉克赢的赔率18.27倍！模型给21%概率。虽然EV极高，但需注意这是冷门投注，高方差。小注试探。",type:"buy"},
  {t1:"Germany",t2:"Curaçao",o:"D",m:22.9,k:3.9,ev:489.4,vol:7307947,mp:[69.3,22.9,7.8],mk:[94.2,3.9,1.9],adv:"模型认为德国vs库拉索有23%平局概率，市场只给4%。虽然德国大概率赢，但25倍赔率的平局有极高EV。适合小注博冷。",type:"buy"},
  {t1:"Canada",t2:"Qatar",o:"L",m:23.8,k:7.5,ev:219.1,vol:101010,mp:[44.7,31.5,23.8],mk:[76.1,16.4,7.5],adv:"模型给卡塔尔24%胜率，市场8%。卡塔尔是卫冕亚洲杯冠军，有一定实力。赔率13.4倍，高EV但高风险。",type:"buy"},
  {t1:"Brazil",t2:"Haiti",o:"D",m:23.9,k:7.3,ev:227.8,vol:195043,mp:[67.9,23.9,8.2],mk:[88.5,7.3,4.2],adv:"模型认为巴西vs海地有24%平局概率，市场7%。巴西近期状态一般，海地防守有韧性。赔率13.7倍。",type:"buy"},
  {t1:"Sweden",t2:"Tunisia",o:"L",m:32.7,k:22.6,ev:44.6,vol:606367,mp:[34.7,32.6,32.7],mk:[49.7,27.6,22.6],adv:"模型给突尼斯33%胜率，市场23%。突尼斯WCQ防守极佳(xGA 0.92)，瑞典进攻乏力(xG 0.95)。正EV机会。",type:"buy"},
  {t1:"Portugal",t2:"Uzbekistan",o:"D",m:25.2,k:13.4,ev:88.1,vol:33871,mp:[64.0,25.2,10.8],mk:[79.1,13.4,7.5],adv:"模型认为葡萄牙vs乌兹别克斯坦有25%平局，市场13%。乌兹别克斯坦WCQ防守稳固(xGA 1.13)，可能爆冷逼平。",type:"buy"},
  {t1:"Spain",t2:"Saudi Arabia",o:"D",m:22.7,k:7.4,ev:204.7,vol:103923,mp:[69.8,22.7,7.5],mk:[88.8,7.4,3.8],adv:"模型给23%平局概率，市场7%。沙特防守不差(xGA 1.00)，西班牙可能轮换阵容。赔率13.4倍。",type:"buy"},
  {t1:"Austria",t2:"Jordan",o:"D",m:28.4,k:17.4,ev:63.3,vol:120162,mp:[56.1,28.4,15.5],mk:[72.1,17.4,10.4],adv:"模型给奥地利vs约旦28%平局，市场17%。约旦WCQ表现不差(xG 1.28)，奥地利并非无敌。正EV。",type:"buy"},
  {t1:"France",t2:"Iraq",o:"D",m:23.4,k:8.4,ev:176.9,vol:123975,mp:[68.6,23.4,8.1],mk:[87.8,8.4,3.7],adv:"模型认为法国有23%概率被伊拉克逼平，市场8%。伊拉克WCQ防守不错(xGA 1.21)，法国可能轻敌。赔率11.9倍。",type:"buy"},
  {t1:"Ecuador",t2:"Curaçao",o:"D",m:27.0,k:12.5,ev:116.7,vol:91231,mp:[60.7,27.0,12.3],mk:[81.2,12.5,6.3],adv:"模型认为厄瓜多尔vs库拉索有27%平局，市场13%。库拉索防守不差(xGA 0.76)。赔率8倍。",type:"buy"},
  {t1:"Sweden",t2:"Tunisia",o:"D",m:32.6,k:27.6,ev:18.1,vol:606367,mp:[34.7,32.6,32.7],mk:[49.7,27.6,22.6],adv:"模型认为瑞典vs突尼斯有33%平局概率，市场28%。两队实力接近，平局概率本来就高。小正EV。",type:"buy"},
  {t1:"Norway",t2:"Senegal",o:"D",m:31.5,k:27.4,ev:14.9,vol:34850,mp:[24.5,31.5,44.0],mk:[44.3,27.4,28.4],adv:"模型认为挪威vs塞内加尔有32%平局，市场27%。两队实力接近，平局合理。小正EV。",type:"buy"},
  {t1:"United States",t2:"Australia",o:"D",m:31.3,k:21.6,ev:44.9,vol:270243,mp:[45.7,31.3,22.9],mk:[61.8,21.6,16.6],adv:"模型认为美国vs澳大利亚有31%平局，市场22%。两队实力接近，美国主场优势有限。正EV。",type:"buy"},
  {t1:"Belgium",t2:"Iran",o:"D",m:30.0,k:19.3,ev:55.4,vol:53607,mp:[49.6,30.0,20.4],mk:[68.8,19.3,11.9],adv:"模型认为比利时vs伊朗有30%平局，市场19%。伊朗WCQ防守稳固(xGA 1.10)，比利时老化严重。正EV。",type:"buy"},
  {t1:"Sweden",t2:"Tunisia",o:"W",m:34.7,k:49.7,ev:-30.2,vol:606367,mp:[34.7,32.6,32.7],mk:[49.7,27.6,22.6],adv:"市场高估瑞典胜率(50% vs 模型35%)。瑞典WCQ xG仅0.95/场，进攻乏力。建议回避瑞典胜或考虑反向投注。",type:"sell"},
  {t1:"Ghana",t2:"Panama",o:"W",m:18.0,k:43.7,ev:-58.8,vol:72174,mp:[18.0,30.0,51.9],mk:[43.7,28.6,27.6],adv:"市场高估加纳胜率(44% vs 模型18%)。加纳WCQ xG仅1.48/场，巴拿马更强。建议回避加纳胜。",type:"sell"},
];

function renderCards(filter) {
  const cards = document.getElementById('cards');
  let html = '';
  let filtered = DATA;
  if (filter === 'positive') filtered = DATA.filter(d => d.ev > 0);
  if (filter === 'highedge') filtered = DATA.filter(d => Math.abs(d.m - d.k) > 15);
  if (filter === 'draw') filtered = DATA.filter(d => d.o === 'D');

  filtered.forEach((d, i) => {
    const edge = d.m - d.k;
    const edgeClass = edge > 0 ? 'positive' : 'negative';
    const evClass = d.ev > 0 ? 'positive' : 'negative';
    const volStr = d.vol > 1000000 ? `$${(d.vol/1000000).toFixed(1)}M` : d.vol > 1000 ? `$${(d.vol/1000).toFixed(0)}k` : `$${d.vol.toFixed(0)}`;

    html += `<div class="card" data-type="${d.type}" data-ev="${d.ev}" data-edge="${Math.abs(edge)}" data-o="${d.o}">`;
    html += `<div class="match-title">${d.t1} vs ${d.t2}</div>`;
    html += `<div style="display:flex;gap:0.8rem;align-items:center;margin-bottom:0.5rem">`;
    html += `<span class="outcome ${d.o}">${d.o === 'W' ? d.t1+'胜' : d.o === 'D' ? '平局' : d.t2+'胜'}</span>`;
    html += `<span class="ev-badge ${evClass}">EV ${d.ev > 0 ? '+' : ''}${d.ev}%</span>`;
    html += `<span class="volume">Vol: ${volStr}</span>`;
    html += `</div>`;

    // Model vs Market bars
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;font-size:0.75rem">`;
    html += `<div><span style="color:#888">Model:</span> <span class="outcome W">${d.mp[0]}%</span><span class="outcome D">${d.mp[1]}%</span><span class="outcome L">${d.mp[2]}%</span></div>`;
    html += `<div><span style="color:#888">Market:</span> <span class="outcome W">${d.mk[0]}%</span><span class="outcome D">${d.mk[1]}%</span><span class="outcome L">${d.mk[2]}%</span></div>`;
    html += `</div>`;

    // Edge bar
    html += `<div class="bar-container"><div class="bar ${d.o}" style="width:${Math.min(100, Math.abs(edge)*2)}%"></div></div>`;
    html += `<div style="font-size:0.7rem;color:#888">Edge: <span class="${edgeClass}">${edge > 0 ? '+' : ''}${edge.toFixed(1)}%</span> | Payout: ${d.k > 0 ? (100/d.k).toFixed(1) : '?'}x</div>`;

    // Advice
    html += `<div class="advice ${d.type}">${d.adv}</div>`;
    html += `</div>`;
  });

  cards.innerHTML = html;
}

function filterAll() { setActiveBtn(0); renderCards(); }
function filterPositiveEV() { setActiveBtn(1); renderCards('positive'); }
function filterHighEdge() { setActiveBtn(2); renderCards('highedge'); }
function filterDraw() { setActiveBtn(3); renderCards('draw'); }
function setActiveBtn(n) {
  document.querySelectorAll('.filter-btn').forEach((b, i) => b.classList.toggle('active', i === n));
}

renderCards();
</script>
</body>
</html>
